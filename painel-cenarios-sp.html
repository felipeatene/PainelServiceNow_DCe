<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cenários DC-e — Plano V2 (SharePoint)</title>
    <style>
        :root {
            --primary:       #0066cc;
            --primary-dark:  #004a99;
            --success:       #4CAF50;
            --warning:       #FF9800;
            --danger:        #F44336;
            --neutral:       #757575;
            --bg:            #f0f4f8;
            --bg-light:      #ffffff;
            --border:        #dde3ec;
            --text-primary:  #212121;
            --text-secondary:#616161;
            --radius-sm:     4px;
            --radius-md:     8px;
            --radius-lg:     16px;
            --shadow-sm:     0 2px 8px rgba(0,0,0,.08);
            --shadow-md:     0 4px 16px rgba(0,0,0,.12);
            --spacing-sm:    8px;
            --spacing-md:    16px;
            --spacing-lg:    24px;
            --spacing-xl:    40px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .sp-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        /* ---- Header ---- */
        .sp-header {
            background: linear-gradient(135deg, #0066cc 0%, #004a99 100%);
            color: #fff;
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg) var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }

        .sp-header h1 { font-size: 1.6rem; font-weight: 700; }
        .sp-header p  { font-size: 0.9rem; opacity: 0.82; margin-top: 4px; }

        .header-back {
            background: rgba(255,255,255,.18);
            color: #fff;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 600;
            transition: background .2s;
            white-space: nowrap;
        }
        .header-back:hover { background: rgba(255,255,255,.3); }

        /* ---- Status banner ---- */
        #sp-banner {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            font-size: 0.9rem;
        }

        #sp-banner .banner-status { font-weight: 600; }
        #sp-banner .banner-status.online  { color: var(--success); }
        #sp-banner .banner-status.offline { color: var(--danger);  }
        #sp-banner .banner-status.loading { color: var(--warning); }

        /* ---- KPI Bar ---- */
        .kpi-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .kpi-tile {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-left: 4px solid var(--color, var(--primary));
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }

        .kpi-tile .tile-num {
            font-size: 2rem;
            font-weight: 800;
            color: var(--color, var(--primary));
            line-height: 1;
        }

        .kpi-tile .tile-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ---- Toolbar ---- */
        .sp-toolbar {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-md);
        }

        .sp-toolbar input[type="search"] {
            flex: 1;
            min-width: 200px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            outline: none;
            transition: border-color .2s;
        }
        .sp-toolbar input[type="search"]:focus { border-color: var(--primary); }

        .sp-toolbar select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            background: var(--bg-light);
            color: var(--text-primary);
            cursor: pointer;
        }

        #btn-refresh {
            padding: 8px 18px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        #btn-refresh:hover { background: var(--primary-dark); }
        #btn-refresh:disabled { opacity: 0.55; cursor: not-allowed; }

        /* ---- Table ---- */
        .table-wrapper {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.86rem;
        }

        thead tr {
            background: linear-gradient(135deg, #0066cc 0%, #004a99 100%);
            color: #fff;
        }

        th {
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        th:hover { background: rgba(255,255,255,.1); }
        th .sort-icon { margin-left: 5px; opacity: 0.6; font-size: 0.65rem; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(0,102,204,.04); }

        td {
            padding: 10px 14px;
            vertical-align: top;
        }

        td.col-title { font-weight: 500; max-width: 340px; word-break: break-word; }
        td.col-passos { color: var(--text-secondary); }

        /* ---- Status pill ---- */
        .status-pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.74rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .pill-ativo     { background: rgba(76,175,80,.15);  color: #2e7d32; }
        .pill-andamento { background: rgba(255,152,0,.15);  color: #e65100; }
        .pill-concluido { background: rgba(97,97,97,.12);   color: #424242; }
        .pill-outros    { background: rgba(0,102,204,.1);   color: #004a99; }

        /* ---- Tag / vincular ---- */
        .tag-cell { display: flex; align-items: center; gap: 6px; }

        .tag-badge {
            display: inline-block;
            background: rgba(0,102,204,.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 1px 7px;
        }

        .btn-tag {
            background: none;
            border: 1px dashed var(--neutral);
            border-radius: 4px;
            color: var(--neutral);
            font-size: 0.72rem;
            padding: 2px 8px;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-tag:hover { border-color: var(--primary); color: var(--primary); }

        /* ---- Expandable passos ---- */
        .passos-toggle {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 0.78rem;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-decoration-style: dashed;
        }

        .passos-body {
            display: none;
            margin-top: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--bg);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--primary);
        }
        .passos-body.open { display: block; }
        .passos-body ol   { padding-left: var(--spacing-md); font-size: 0.82rem; color: var(--text-secondary); }
        .passos-body li   { margin-bottom: 4px; }

        /* ---- Pagination ---- */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            border-top: 1px solid var(--border);
        }

        .page-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            background: var(--bg-light);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all .2s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
        .page-btn.active   { background: var(--primary); color: #fff; border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ---- Empty / error state ---- */
        #sp-empty {
            display: none;
            text-align: center;
            padding: 48px var(--spacing-lg);
            color: var(--text-secondary);
        }
        #sp-empty .empty-icon { font-size: 2.4rem; }
        #sp-empty p { margin-top: var(--spacing-md); font-size: 0.92rem; }

        /* ---- Modal para vincular tag ---- */
        #tag-modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #tag-modal-overlay.active { display: flex; }

        #tag-modal {
            background: var(--bg-light);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            width: 440px;
            max-width: 95%;
            box-shadow: var(--shadow-md);
        }
        #tag-modal h3 { font-size: 1.1rem; margin-bottom: var(--spacing-md); }
        #tag-modal label { font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 4px; }
        #tag-modal input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            margin-bottom: var(--spacing-md);
        }

        .modal-actions { display: flex; gap: var(--spacing-sm); justify-content: flex-end; }
        .btn-modal-cancel {
            padding: 8px 18px;
            border: 1px solid var(--border);
            background: var(--bg-light);
            border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.88rem;
        }
        .btn-modal-save {
            padding: 8px 18px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.88rem;
            font-weight: 600;
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .sp-header  { flex-direction: column; align-items: flex-start; }
            th, td       { padding: 8px 10px; }
            .col-passos { display: none; }
        }
    </style>
</head>
<body>
<div class="sp-wrapper">

    <!-- Header -->
    <header class="sp-header">
        <div>
            <h1>Cenários DC-e — Plano V2</h1>
            <p>Dados ao vivo do SharePoint · Lista "Plano DCE Cenários V2"</p>
        </div>
        <a href="painel-triagem-dce.html" class="header-back">← Voltar ao Painel</a>
    </header>

    <!-- Status banner -->
    <div id="sp-banner">
        <span id="banner-status" class="banner-status loading">⏳ Conectando ao SharePoint...</span>
        <span id="banner-info" style="color:var(--text-secondary); font-size:0.82rem;"></span>
    </div>

    <!-- KPI bar -->
    <div class="kpi-bar">
        <div class="kpi-tile" style="--color:#0066cc">
            <div class="tile-num" id="kpi-total">—</div>
            <div class="tile-label">Total de Cenários</div>
        </div>
        <div class="kpi-tile" style="--color:#4CAF50">
            <div class="tile-num" id="kpi-ativos">—</div>
            <div class="tile-label">Ativos / Em Andamento</div>
        </div>
        <div class="kpi-tile" style="--color:#757575">
            <div class="tile-num" id="kpi-concluidos">—</div>
            <div class="tile-label">Concluídos</div>
        </div>
        <div class="kpi-tile" style="--color:#FF9800">
            <div class="tile-num" id="kpi-outros">—</div>
            <div class="tile-label">Outros status</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="sp-toolbar">
        <input type="search" id="search-input" placeholder="Buscar cenário...">
        <select id="filter-status">
            <option value="">Todos os status</option>
            <option value="ativo">Ativo</option>
            <option value="em andamento">Em andamento</option>
            <option value="concluido">Concluído</option>
        </select>
        <button id="btn-refresh">↻ Atualizar</button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table id="sp-table">
            <thead>
                <tr>
                    <th data-col="titulo">Título <span class="sort-icon">⇅</span></th>
                    <th data-col="status">Status <span class="sort-icon">⇅</span></th>
                    <th data-col="passos" class="col-passos">Passos</th>
                    <th data-col="tag">Tag DC-e</th>
                </tr>
            </thead>
            <tbody id="sp-tbody"></tbody>
        </table>
        <div id="sp-empty">
            <div class="empty-icon">📋</div>
            <p id="sp-empty-msg">Nenhum cenário encontrado.</p>
        </div>
        <div class="pagination" id="sp-pagination"></div>
    </div>

</div>

<!-- Modal Vincular Tag -->
<div id="tag-modal-overlay">
    <div id="tag-modal">
        <h3>Vincular Tag DC-e</h3>
        <input type="hidden" id="tag-item-id">
        <label for="tag-input">Tag</label>
        <input type="text" id="tag-input" placeholder="ex: chip-ativacao, chip-cnpj..." autocomplete="off">
        <div class="modal-actions">
            <button class="btn-modal-cancel" id="tag-modal-cancel">Cancelar</button>
            <button class="btn-modal-save"   id="tag-modal-save">Salvar</button>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    /* ---- Config ---- */
    var SP_PROXY_BASE = '/proxy-sp';
    var LIST_NAME  = 'Plano DCE  Cenrios V2';   // duplo espaço + sem acento (URL original)
    var PAGE_SIZE  = 20;

    /* ---- Auth (JWT) ---- */
    var authAccessToken  = null;
    var authRefreshToken = null;
    var authTokenExpiry  = 0;

    function loadPersistedAuthTokens() {
        try {
            authAccessToken = sessionStorage.getItem('dce_access_token') || null;
            authRefreshToken = sessionStorage.getItem('dce_refresh_token') || null;
            authTokenExpiry = parseInt(sessionStorage.getItem('dce_token_expiry') || '0', 10) || 0;
        } catch (e) {
            authAccessToken = null;
            authRefreshToken = null;
            authTokenExpiry = 0;
        }
    }

    function persistAuthTokens() {
        try {
            sessionStorage.setItem('dce_access_token', authAccessToken || '');
            sessionStorage.setItem('dce_refresh_token', authRefreshToken || '');
            sessionStorage.setItem('dce_token_expiry', String(authTokenExpiry || 0));
        } catch (e) {
            // noop
        }
    }

    /* ---- State ---- */
    var allItems    = [];   // raw SharePoint items
    var filtered    = [];   // after search + status filter
    var sortCol     = 'titulo';
    var sortAsc     = true;
    var currentPage = 1;
    var localTags   = {};   // { itemId: 'tag' }  — stored in localStorage

    /* ---- DOM refs ---- */
    var tbody        = document.getElementById('sp-tbody');
    var paginationEl = document.getElementById('sp-pagination');
    var emptyEl      = document.getElementById('sp-empty');
    var emptyMsg     = document.getElementById('sp-empty-msg');
    var bannerStatus = document.getElementById('banner-status');
    var bannerInfo   = document.getElementById('banner-info');

    /* ---- Persist tags in localStorage ---- */
    function loadTags()  { try { localTags = JSON.parse(localStorage.getItem('dce_tags') || '{}'); } catch(e) { localTags = {}; } }
    function saveTag(id, tag) { localTags[id] = tag; localStorage.setItem('dce_tags', JSON.stringify(localTags)); }

    /* ---- Fetch from SharePoint ---- */
    function fetchScenarios() {
        setBanner('loading', '⏳ Conectando ao SharePoint...');
        document.getElementById('btn-refresh').disabled = true;

        var url = SP_PROXY_BASE + '/_api/web/lists/getByTitle(\'' + encodeURIComponent(LIST_NAME) + '\')/items' +
            '?$select=ID,Title,Status,Estado,Situacao,Passos,Descricao&$top=5000&$orderby=Title';

        var headers = { 'Accept': 'application/json;odata=nometadata' };
        // Adiciona JWT Bearer token se disponível
        if (authAccessToken) {
            headers['Authorization'] = 'Bearer ' + authAccessToken;
        }

        fetch(url, {
            headers: headers
        }).then(function (res) {
            if (!res.ok) {
                if (res.status === 401 && authRefreshToken) {
                    // Tenta renovar token
                    return refreshAccessToken().then(function (ok) {
                        if (ok) {
                            return fetchScenarios();  // Retenta
                        }
                        throw new Error('Sessão expirada. Faça login novamente.');
                    });
                }
                throw new Error('HTTP ' + res.status + ' — verifique se está logado no SharePoint.');
            }
            return res.json();
        }).then(function (data) {
            allItems = data.value || [];
            setBanner('online', '● Conectado · ' + allItems.length + ' cenário(s) carregado(s)');
            bannerInfo.textContent = 'Última atualização: ' + new Date().toLocaleTimeString('pt-BR');
            document.getElementById('btn-refresh').disabled = false;
            updateKPIs();
            applyFilters();
        }).catch(function (err) {
            setBanner('offline', '⚠ Não foi possível carregar dados — ' + (err.message || 'verifique conexão e login.'));
            bannerInfo.textContent = 'Tente abrir o SharePoint em outra aba e recarregar.';
            document.getElementById('btn-refresh').disabled = false;
            showEmpty(err.message || 'Erro ao conectar ao SharePoint.');
        });
    }

    function refreshAccessToken() {
        if (!authRefreshToken) {
            return Promise.resolve(false);
        }
        return fetch('/auth/refresh', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_token: authRefreshToken })
        }).then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.ok && data.access_token) {
                authAccessToken = data.access_token;
                authTokenExpiry = Math.floor(Date.now() / 1000) + data.expires_in;
                persistAuthTokens();
                return true;
            }
            return false;
        }).catch(function () {
            return false;
        });
    }

    /* ---- KPIs ---- */
    function updateKPIs() {
        var total  = allItems.length;
        var active = countByStatus(['ativo', 'em andamento', 'active', 'in progress']);
        var done   = countByStatus(['concluído', 'concluido', 'done', 'completed', 'finalizado']);
        var others = total - active - done;

        document.getElementById('kpi-total').textContent      = total;
        document.getElementById('kpi-ativos').textContent     = active;
        document.getElementById('kpi-concluidos').textContent = done;
        document.getElementById('kpi-outros').textContent     = Math.max(0, others);
    }

    function countByStatus(vals) {
        return allItems.filter(function (i) {
            var s = (i.Status || i.Estado || i.Situacao || '').toLowerCase();
            return vals.indexOf(s) !== -1;
        }).length;
    }

    /* ---- Filter + sort ---- */
    function applyFilters() {
        var query   = (document.getElementById('search-input').value || '').toLowerCase().trim();
        var statusF = (document.getElementById('filter-status').value || '').toLowerCase().trim();

        filtered = allItems.filter(function (i) {
            var title = (i.Title || '').toLowerCase();
            var status = (i.Status || i.Estado || i.Situacao || '').toLowerCase();
            var matchQ = !query || title.indexOf(query) !== -1;
            var matchS = !statusF || status.indexOf(statusF) !== -1;
            return matchQ && matchS;
        });

        // Sort
        filtered.sort(function (a, b) {
            var va = sortCol === 'titulo' ? (a.Title || '') : (a.Status || a.Estado || a.Situacao || '');
            var vb = sortCol === 'titulo' ? (b.Title || '') : (b.Status || b.Estado || b.Situacao || '');
            return sortAsc ? va.localeCompare(vb, 'pt-BR') : vb.localeCompare(va, 'pt-BR');
        });

        currentPage = 1;
        render();
    }

    /* ---- Render table page ---- */
    function render() {
        var start = (currentPage - 1) * PAGE_SIZE;
        var page  = filtered.slice(start, start + PAGE_SIZE);

        if (filtered.length === 0) {
            tbody.innerHTML = '';
            showEmpty('Nenhum cenário encontrado para os filtros selecionados.');
            renderPagination(0);
            return;
        }

        emptyEl.style.display = 'none';

        tbody.innerHTML = page.map(function (item) {
            var id      = item.ID;
            var title   = escHtml(item.Title || '(sem título)');
            var rawSt   = item.Status || item.Estado || item.Situacao || '';
            var pill    = statusPill(rawSt);
            var tag     = localTags[id] || '';
            var passosRaw = item.Passos || item.Descricao || '';
            var passosHtml = buildPassos(passosRaw, id);

            return '<tr>' +
                '<td class="col-title">' + title + passosHtml + '</td>' +
                '<td>' + pill + '</td>' +
                '<td class="col-passos">' + (passosRaw ? '<button class="passos-toggle" data-id="' + id + '">Ver...</button>' : '<span style="opacity:.4">—</span>') + '</td>' +
                '<td class="tag-cell">' +
                    (tag ? '<span class="tag-badge">' + escHtml(tag) + '</span>' : '') +
                    '<button class="btn-tag" data-id="' + id + '" data-title="' + escHtml(item.Title || '') + '">+ Tag</button>' +
                '</td>' +
                '</tr>';
        }).join('');

        renderPagination(filtered.length);
        bindRowEvents();
    }

    function buildPassos(raw, id) {
        if (!raw) return '';
        var lines = raw.split(/[\n;,]+/).map(function(l){ return l.trim(); }).filter(Boolean);
        if (!lines.length) return '';
        return '<div class="passos-body" id="passos-' + id + '">' +
            '<ol>' + lines.map(function(l){ return '<li>' + escHtml(l) + '</li>'; }).join('') + '</ol>' +
            '</div>';
    }

    function renderPagination(total) {
        if (total === 0) { paginationEl.innerHTML = ''; return; }
        var pages = Math.ceil(total / PAGE_SIZE);
        var html  = '';

        html += '<button class="page-btn" id="pg-prev" ' + (currentPage <= 1 ? 'disabled' : '') + '>‹ Ant.</button>';

        var start = Math.max(1, currentPage - 2);
        var end   = Math.min(pages, currentPage + 2);

        if (start > 1)     html += '<button class="page-btn" data-pg="1">1</button>' + (start > 2 ? '<span style="padding:0 4px">…</span>' : '');
        for (var p = start; p <= end; p++) {
            html += '<button class="page-btn' + (p === currentPage ? ' active' : '') + '" data-pg="' + p + '">' + p + '</button>';
        }
        if (end < pages)   html += (end < pages - 1 ? '<span style="padding:0 4px">…</span>' : '') + '<button class="page-btn" data-pg="' + pages + '">' + pages + '</button>';

        html += '<button class="page-btn" id="pg-next" ' + (currentPage >= pages ? 'disabled' : '') + '>Próx. ›</button>';
        html += '<span style="font-size:.8rem;color:var(--text-secondary);margin-left:8px">' + total + ' resultado(s)</span>';
        paginationEl.innerHTML = html;

        document.getElementById('pg-prev').addEventListener('click', function() { if (currentPage > 1) { currentPage--; render(); } });
        document.getElementById('pg-next').addEventListener('click', function() { if (currentPage < pages) { currentPage++; render(); } });
        paginationEl.querySelectorAll('[data-pg]').forEach(function(btn) {
            btn.addEventListener('click', function() { currentPage = parseInt(this.getAttribute('data-pg')); render(); });
        });
    }

    function bindRowEvents() {
        // Passos toggle
        tbody.querySelectorAll('.passos-toggle').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var id = this.getAttribute('data-id');
                var body = document.getElementById('passos-' + id);
                if (!body) return;
                body.classList.toggle('open');
                this.textContent = body.classList.contains('open') ? 'Ocultar' : 'Ver...';
            });
        });

        // Tag btn
        tbody.querySelectorAll('.btn-tag').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var id    = this.getAttribute('data-id');
                var title = this.getAttribute('data-title');
                openTagModal(id, title);
            });
        });
    }

    /* ---- Tag Modal ---- */
    function openTagModal(id, title) {
        document.getElementById('tag-modal-overlay').classList.add('active');
        document.getElementById('tag-item-id').value = id;
        document.getElementById('tag-input').value   = localTags[id] || '';
        document.querySelector('#tag-modal h3').textContent = 'Vincular Tag · ' + (title.length > 50 ? title.substring(0,50) + '…' : title);
        document.getElementById('tag-input').focus();
    }

    function closeTagModal() {
        document.getElementById('tag-modal-overlay').classList.remove('active');
    }

    document.getElementById('tag-modal-cancel').addEventListener('click', closeTagModal);
    document.getElementById('tag-modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeTagModal();
    });

    document.getElementById('tag-modal-save').addEventListener('click', function() {
        var id  = document.getElementById('tag-item-id').value;
        var tag = document.getElementById('tag-input').value.trim();
        if (id) saveTag(id, tag);
        closeTagModal();
        render();
    });

    /* ---- Sort headers ---- */
    document.querySelectorAll('th[data-col]').forEach(function(th) {
        th.addEventListener('click', function() {
            var col = this.getAttribute('data-col');
            if (!col || col === 'passos' || col === 'tag') return;
            if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
            applyFilters();
        });
    });

    /* ---- Status pill helper ---- */
    function statusPill(raw) {
        var s = (raw || '').toLowerCase();
        var cls, label;
        if (s === 'ativo' || s === 'active')                        { cls = 'pill-ativo';     label = 'Ativo'; }
        else if (s === 'em andamento' || s === 'in progress')       { cls = 'pill-andamento'; label = 'Em andamento'; }
        else if (['concluído','concluido','done','completed','finalizado'].indexOf(s) !== -1) { cls = 'pill-concluido'; label = 'Concluído'; }
        else                                                         { cls = 'pill-outros';    label = raw || '?'; }
        return '<span class="status-pill ' + cls + '">' + escHtml(label) + '</span>';
    }

    function setBanner(type, text) {
        bannerStatus.className = 'banner-status ' + type;
        bannerStatus.textContent = text;
    }

    function showEmpty(msg) {
        emptyEl.style.display = 'block';
        emptyMsg.textContent = msg || 'Nenhum cenário encontrado.';
        paginationEl.innerHTML = '';
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    /* ---- Toolbar listeners ---- */
    document.getElementById('search-input').addEventListener('input', applyFilters);
    document.getElementById('filter-status').addEventListener('change', applyFilters);
    document.getElementById('btn-refresh').addEventListener('click', fetchScenarios);

    /* ---- Init ---- */
    loadPersistedAuthTokens();
    loadTags();
    fetchScenarios();

})();
</script>
</body>
</html>
